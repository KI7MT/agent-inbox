name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run when a new commit lands on the same ref
# (PR branch or main). Saves runner minutes on rapid iterations.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (ubuntu, py3.12, go1.23, node22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ---------------------------------------------------------------
      # Python — uv-managed venv, run pytest
      # ---------------------------------------------------------------

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync Python dependencies (frozen against uv.lock)
        run: uv sync --frozen --extra dev

      - name: Run Python tests
        run: uv run pytest -v

      # ---------------------------------------------------------------
      # Frontend — npm install + build (required for the Go side's
      # //go:embed directive in ui/main.go) + svelte-check
      # ---------------------------------------------------------------

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui/frontend
        run: npm ci

      - name: Type-check frontend (svelte-check)
        working-directory: ui/frontend
        run: npm run check

      - name: Build frontend (produces dist/ for go:embed)
        working-directory: ui/frontend
        run: npm run build

      # ---------------------------------------------------------------
      # Go backend — go test (depends on frontend/dist/ existing)
      # ---------------------------------------------------------------

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ui/go.sum

      - name: Run Go tests
        working-directory: ui
        run: go test -v ./...
