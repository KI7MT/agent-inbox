name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run when a new commit lands on the same ref
# (PR branch or main). Saves runner minutes on rapid iterations.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Defensive default: opt any straggler JavaScript actions to the Node 24
# runtime ahead of GitHub's 2026-06-02 default flip. As of v0.3.11 every
# pinned action declares Node 24 natively, so this no longer fires for
# anything in the workflow — left in place to cover future action additions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Force UTF-8 stdio on Windows runners — without this, Python's
  # default cp1252 codec mangles unicode output from emoji / NFC tests.
  PYTHONIOENCODING: utf-8

jobs:
  # -------------------------------------------------------------------
  # Lint — Python (ruff) + Go (golangci-lint). Runs in parallel with
  # the test matrix; cheap, ubuntu-only.
  # -------------------------------------------------------------------
  lint:
    name: lint (ruff + golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync Python dependencies (frozen)
        run: uv sync --frozen --extra dev

      - name: Run ruff
        run: uv run ruff check src tests

      # Frontend dist must exist before any Go tooling because main.go
      # uses //go:embed all:frontend/dist — golangci-lint type-checks
      # the source and fails without it. Same prereq as go test.
      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Build frontend (produces dist/ for go:embed)
        working-directory: ui/frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ui/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ui

  # -------------------------------------------------------------------
  # Python suite — full multi-version coverage on Linux (cheapest
  # runner) plus single-Python smoke on macOS and Windows for cross-OS
  # parity. The combo keeps total runner minutes reasonable while
  # validating the >=3.10 floor and the per-OS path resolution.
  # -------------------------------------------------------------------
  python:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync Python dependencies (frozen against uv.lock)
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: uv run pytest -v

  # -------------------------------------------------------------------
  # Go + frontend suite — runs on all three OSes against Go 1.23 and
  # Node 22. Frontend build is required first because main.go's
  # //go:embed all:frontend/dist directive fails to compile if the
  # directory is missing.
  # -------------------------------------------------------------------
  go-and-frontend:
    name: go + svelte (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui/frontend
        run: npm ci

      - name: Type-check frontend (svelte-check)
        working-directory: ui/frontend
        run: npm run check

      - name: Build frontend (produces dist/ for go:embed)
        working-directory: ui/frontend
        run: npm run build

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ui/go.sum

      - name: Run Go tests
        working-directory: ui
        run: go test -v ./...

  # -------------------------------------------------------------------
  # Wails GUI build smoke — proves `wails build -platform darwin/universal`
  # actually produces a runnable .app bundle on a clean macOS runner.
  # The closest we can get to a real user's first-time install without
  # a hands-on-Mac smoke. Slow (~3-5 min) but only runs once per CI.
  # -------------------------------------------------------------------
  wails-build:
    name: wails build (darwin/universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ui/go.sum

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Wails doctor (info only — failures don't block)
        working-directory: ui
        run: $(go env GOPATH)/bin/wails doctor || true

      - name: Build universal macOS binary
        working-directory: ui
        run: $(go env GOPATH)/bin/wails build -platform darwin/universal -clean

      - name: Verify .app bundle was produced
        # Wails names the .app bundle after wails.json's `name` field
        # (`agent-inbox`), while the embedded binary is named after the
        # `outputfilename` field (`agent-inbox-ui`). Both are intentional —
        # see ui/wails.json.
        working-directory: ui
        run: |
          ls -la build/bin/
          test -d build/bin/agent-inbox.app || (echo "App bundle missing"; exit 1)
          test -x build/bin/agent-inbox.app/Contents/MacOS/agent-inbox-ui || (echo "Executable missing"; exit 1)
          file build/bin/agent-inbox.app/Contents/MacOS/agent-inbox-ui

      - name: Upload .app artifact (for manual inspection on demand)
        uses: actions/upload-artifact@v4
        with:
          name: agent-inbox-darwin-universal-${{ github.sha }}
          path: ui/build/bin/agent-inbox.app
          retention-days: 14

  # -------------------------------------------------------------------
  # Aggregator — single status check that turns green only when every
  # matrix cell above passes. Stable name for branch protection rules
  # so adding/removing matrix cells later doesn't require updating the
  # ruleset.
  # -------------------------------------------------------------------
  ci-all-green:
    name: ci-all-green
    runs-on: ubuntu-latest
    needs: [lint, python, go-and-frontend, wails-build]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.python.result }}" != "success" ] || \
             [ "${{ needs.go-and-frontend.result }}" != "success" ] || \
             [ "${{ needs.wails-build.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  lint:            ${{ needs.lint.result }}"
            echo "  python:          ${{ needs.python.result }}"
            echo "  go-and-frontend: ${{ needs.go-and-frontend.result }}"
            echo "  wails-build:     ${{ needs.wails-build.result }}"
            exit 1
          fi
          echo "All jobs passed."
